name = "aifred-site"
pages_build_output_dir = "."
compatibility_date = "2026-04-22"

[observability]
enabled = true
head_sampling_rate = 1

[[services]]
binding = "MAILER"
service = "aifred-mailer"
environment = "production"

[[kv_namespaces]]
binding = "AIFRED_REFERENCE_POOL"
id = "8a120701767e474f928d1af7037cd68a"

[[kv_namespaces]]
binding = "AIFRED_SALES_LOG"
id = "2c66da7795b54135a4d67e514b97491f"

[[r2_buckets]]
binding = "AIFRED_DOWNLOADS"
bucket_name = "aifred-downloads"

[[r2_buckets]]
binding = "AIFRED_CATALOG"
bucket_name = "aifred-catalog"

[[r2_buckets]]
binding = "AIFRED_REFERENCE_BUCKET"
bucket_name = "aifred-reference-pool"

[[d1_databases]]
binding = "AIFRED_DB"
database_name = "aifred-db"
database_id = "f4c9a59b-1234-5678-90ab-cdef12345678"
