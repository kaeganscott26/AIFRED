name: Build AIFRED

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  vst3:
    name: VST3 ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
          - name: macos
            os: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build/aifred -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build/aifred --config Release --parallel

      - uses: actions/setup-dotnet@v5
        if: runner.os == 'Windows'
        with:
          dotnet-version: "10.0.x"

      - name: Package Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $plugin = Get-ChildItem build/aifred -Recurse -Filter Aifred.vst3 | Where-Object { $_.PSIsContainer } | Select-Object -First 1
          New-Item -ItemType Directory -Force -Path package/AIFRED-Windows | Out-Null
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item -Recurse -LiteralPath $plugin.FullName -Destination package/AIFRED-Windows/Aifred.vst3
          @(
            '$ErrorActionPreference = "Stop"',
            '$source = Join-Path $PSScriptRoot "Aifred.vst3"',
            '$target = Join-Path $env:LOCALAPPDATA "Programs\Common\VST3\Aifred.vst3"',
            'New-Item -ItemType Directory -Force -Path (Split-Path $target) | Out-Null',
            'if (Test-Path -LiteralPath $target) { Remove-Item -LiteralPath $target -Recurse -Force }',
            'Copy-Item -Recurse -Force -LiteralPath $source -Destination $target',
            'Write-Host "AIFRED installed to $target. Rescan plugins in FL Studio."'
          ) | Set-Content package/AIFRED-Windows/install-aifred.ps1
          Compress-Archive -Path package/AIFRED-Windows/* -DestinationPath dist/AIFRED-VST3-windows.zip
          dotnet publish tools/AifredWindowsInstaller/AifredWindowsInstaller.csproj -c Release -o dist/installer/windows
          Copy-Item dist/installer/windows/AIFRED-VST3-Setup.exe AIFRED-VST3-Setup.exe
          Copy-Item dist/AIFRED-VST3-windows.zip AIFRED-VST3-windows.zip

      - name: Package macOS installer
        if: runner.os == 'macOS'
        run: |
          PLUGIN="$(find build/aifred -name Aifred.vst3 -type d | head -n 1)"
          mkdir -p package/AIFRED-macOS
          cp -R "$PLUGIN" package/AIFRED-macOS/Aifred.vst3
          cat > package/AIFRED-macOS/install-aifred.command <<'SCRIPT'
          #!/bin/sh
          set -eu
          SRC="$(cd "$(dirname "$0")" && pwd)/Aifred.vst3"
          DEST="$HOME/Library/Audio/Plug-Ins/VST3/Aifred.vst3"
          mkdir -p "$(dirname "$DEST")"
          rm -rf "$DEST"
          cp -R "$SRC" "$DEST"
          echo "AIFRED installed to $DEST. Rescan plugins in your DAW."
          SCRIPT
          chmod +x package/AIFRED-macOS/install-aifred.command
          ditto -c -k --keepParent package/AIFRED-macOS AIFRED-VST3-macOS.zip

      - name: Upload VST3 package
        uses: actions/upload-artifact@v4
        with:
          name: AIFRED-VST3-${{ matrix.name }}
          path: |
            AIFRED-VST3-*.zip
            AIFRED-VST3-Setup.exe
            AIFRED-VST3-*.tar.gz
          if-no-files-found: error

  arch-linux:
    name: VST3 arch-linux
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Arch build dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm base-devel cmake git ninja alsa-lib curl freetype2 libx11 libxcomposite libxcursor libxext libxinerama libxrandr mesa webkit2gtk-4.1

      - name: Configure
        run: cmake -S . -B build/aifred -G Ninja -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build/aifred --parallel

      - name: Package Arch installer
        run: |
          PLUGIN="$(find build/aifred -name Aifred.vst3 -type d | head -n 1)"
          mkdir -p package/AIFRED-Arch
          cp -R "$PLUGIN" package/AIFRED-Arch/Aifred.vst3
          cat > package/AIFRED-Arch/install-aifred.sh <<'SCRIPT'
          #!/usr/bin/env bash
          set -euo pipefail
          SRC="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)/Aifred.vst3"
          DEST="$HOME/.vst3/Aifred.vst3"
          mkdir -p "$(dirname "$DEST")"
          rm -rf "$DEST"
          cp -R "$SRC" "$DEST"
          echo "AIFRED installed to $DEST. Rescan plugins in your DAW."
          SCRIPT
          chmod +x package/AIFRED-Arch/install-aifred.sh
          tar -czf AIFRED-VST3-Arch.tar.gz -C package AIFRED-Arch

      - name: Upload Arch package
        uses: actions/upload-artifact@v4
        with:
          name: AIFRED-VST3-arch-linux
          path: AIFRED-VST3-Arch.tar.gz

  android-admin:
    name: Android admin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Build debug APK
        working-directory: android_admin
        run: bash ./gradlew assembleDebug

  website:
    name: Website checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: JavaScript syntax
        run: |
          node --check website/app.js
          node --check website/_worker.js
          node --check 'website/functions/api/v1/[[path]].js'
          node --check 'website/functions/api/[[path]].js'
          node --check website/functions/ws/chat.js
          node --check tools/serve-website.mjs

      - name: Guard active paths and product names
        shell: pwsh
        run: ./tools/check-no-hardcoded-paths.ps1

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [vst3, arch-linux, website]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" release-assets/* \
            --title "AIFRED ${GITHUB_REF_NAME}" \
            --notes "AIFRED release packages for Windows VST3, macOS VST3, and Arch Linux VST3. The Android admin app is private and is not distributed through releases."

  deploy-website:
    name: Deploy Cloudflare Pages
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [website]
    env:
      CLOUDFLARE_CREDENTIALS_PRESENT: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Skip when Cloudflare token is missing
        if: env.CLOUDFLARE_CREDENTIALS_PRESENT != 'true'
        run: echo "Set CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID repository secrets to enable Cloudflare Pages deployment."

      - uses: actions/setup-node@v4
        if: env.CLOUDFLARE_CREDENTIALS_PRESENT == 'true'
        with:
          node-version: 22

      - name: Deploy to Cloudflare Pages
        if: env.CLOUDFLARE_CREDENTIALS_PRESENT == 'true'
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx wrangler@latest pages deploy website --project-name=north3rnlight3r --branch=main || {
            echo "::warning::Cloudflare Pages deployment skipped because repository Cloudflare credentials were rejected. Local Wrangler deploy remains valid; rotate CLOUDFLARE_API_TOKEN to restore CI deploys."
            exit 0
          }
