name: Build AIFRED

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  vst3:
    name: VST3 ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build/aifred -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build/aifred --config Release --parallel

      - uses: actions/setup-dotnet@v5
        if: runner.os == 'Windows'
        with:
          dotnet-version: "10.0.x"

      - name: Package Windows installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          powershell -NoProfile -ExecutionPolicy Bypass -File tools/package-aifred.ps1 -BuildRoot build/aifred -OutputDir dist -Platform windows
          dotnet publish tools/AifredWindowsInstaller/AifredWindowsInstaller.csproj -c Release -o dist/installer/windows
          Copy-Item dist/installer/windows/AIFRED-VST3-Setup.exe AIFRED-VST3-Setup.exe
          Copy-Item dist/AIFRED-VST3-windows.zip AIFRED-VST3-windows.zip

      - name: Upload VST3 package
        uses: actions/upload-artifact@v4
        with:
          name: AIFRED-VST3-${{ matrix.name }}
          path: |
            AIFRED-VST3-*.zip
            AIFRED-VST3-Setup.exe
          if-no-files-found: error

  android-admin:
    name: Android admin
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Build debug APK
        working-directory: android_admin
        run: bash ./gradlew assembleDebug

  website:
    name: Website checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: JavaScript syntax
        run: |
          node --check website/app.js
          node --check website/_worker.js
          node --check 'website/functions/api/v1/[[path]].js'
          node --check 'website/functions/api/[[path]].js'
          node --check website/functions/ws/chat.js
          node --check tools/serve-website.mjs

      - name: Guard active paths and product names
        shell: pwsh
        run: ./tools/check-no-hardcoded-paths.ps1

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [vst3, website]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" release-assets/* \
            --title "AIFRED ${GITHUB_REF_NAME}" \
            --notes "AIFRED release package for Windows VST3. The Android admin app is private and is not distributed through releases."

  deploy-website:
    name: Deploy Cloudflare Pages
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [website]
    env:
      CLOUDFLARE_CREDENTIALS_PRESENT: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Skip when Cloudflare token is missing
        if: env.CLOUDFLARE_CREDENTIALS_PRESENT != 'true'
        run: echo "Set CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID repository secrets to enable Cloudflare Pages deployment."

      - uses: actions/setup-node@v4
        if: env.CLOUDFLARE_CREDENTIALS_PRESENT == 'true'
        with:
          node-version: 22

      - name: Deploy to Cloudflare Pages
        if: env.CLOUDFLARE_CREDENTIALS_PRESENT == 'true'
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx wrangler@latest pages deploy website --project-name=north3rnlight3r --branch=main || {
            echo "::warning::Cloudflare Pages deployment skipped because repository Cloudflare credentials were rejected. Local Wrangler deploy remains valid; rotate CLOUDFLARE_API_TOKEN to restore CI deploys."
            exit 0
          }
