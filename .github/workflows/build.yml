name: Build AIFRED

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  vst3:
    name: VST3 ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
            package_platform: windows
          - name: macos
            os: macos-latest
            package_platform: macos
          - name: linux
            os: ubuntu-latest
            package_platform: linux

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libjack-jackd2-dev ladspa-sdk libcurl4-openssl-dev libfreetype6-dev libx11-dev libxcomposite-dev libxcursor-dev libxext-dev libxinerama-dev libxrandr-dev libxrender-dev libwebkit2gtk-4.1-dev

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Configure
        run: cmake -S . -B build/aifred -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build/aifred --config Release --parallel

      - name: Package VST3
        shell: pwsh
        run: ./tools/package-aifred.ps1 -BuildRoot build/aifred -OutputDir dist -Platform ${{ matrix.package_platform }}

      - name: Build Windows one-click installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          dotnet publish tools/AifredWindowsInstaller/AifredWindowsInstaller.csproj -c Release -o dist/installer/windows
          Copy-Item dist/installer/windows/AIFRED-VST3-Setup.exe AIFRED-VST3-Setup.exe

      - name: Stage release artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Copy-Item dist/AIFRED-VST3-${{ matrix.package_platform }}.zip release-assets/
          if (Test-Path AIFRED-VST3-Setup.exe) { Copy-Item AIFRED-VST3-Setup.exe release-assets/ }

      - name: Upload VST3 package
        uses: actions/upload-artifact@v4
        with:
          name: AIFRED-VST3-${{ matrix.name }}
          path: release-assets/*
          if-no-files-found: error

  arch:
    name: VST3 arch
    runs-on: ubuntu-latest
    container: archlinux:latest
    steps:
      - name: Install build deps
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm git cmake gcc make ninja pkgconf zip alsa-lib jack2 libx11 libxcomposite libxcursor libxext libxinerama libxrandr libxrender freetype2 curl webkit2gtk-4.1

      - uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build/aifred -DCMAKE_BUILD_TYPE=Release -G Ninja

      - name: Build
        run: cmake --build build/aifred --config Release --parallel

      - name: Package Arch VST3
        run: |
          set -eu
          plugin="$(find build/aifred -type d -name 'Aifred.vst3' | head -n 1)"
          test -n "$plugin"
          rm -rf dist/AIFRED-VST3-arch dist/AIFRED-VST3-arch.zip
          mkdir -p dist/AIFRED-VST3-arch/Aifred/{bin,config,logs,models}
          cp -R "$plugin" dist/AIFRED-VST3-arch/Aifred.vst3
          cat > dist/AIFRED-VST3-arch/Aifred/config/config.json <<'JSON'
          {
            "mode": "local",
            "port": 8787,
            "provider": "ollama",
            "model_path": "models/aifred-assistant-q4.gguf",
            "model_name": "aifred:latest",
            "openai_api_key": "",
            "custom_endpoint": "http://127.0.0.1:11434",
            "timeout_ms": 180000
          }
          JSON
          cat > dist/AIFRED-VST3-arch/Aifred/models/README.txt <<'TXT'
          Optional offline model slot: place a licensed GGUF model here as aifred-assistant-q4.gguf.
          AIFRED uses local Ollama chat by default, and users can configure an OpenAI-compatible API route for online chat.
          TXT
          cd dist/AIFRED-VST3-arch
          zip -r ../AIFRED-VST3-arch.zip .

      - uses: actions/upload-artifact@v4
        with:
          name: AIFRED-VST3-arch
          path: dist/AIFRED-VST3-arch.zip
          if-no-files-found: error

  website:
    name: Website checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: JavaScript syntax
        run: |
          node --check website/app.js
          node --check website/_worker.js
          node --check 'website/functions/api/v1/[[path]].js'
          node --check 'website/functions/api/[[path]].js'
          node --check website/functions/ws/chat.js
          node --check tools/serve-website.mjs

      - name: Guard active paths and product names
        shell: pwsh
        run: ./tools/check-no-hardcoded-paths.ps1

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [vst3, arch, website]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" release-assets/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" release-assets/* \
              --title "AIFRED ${GITHUB_REF_NAME}" \
              --notes-file docs/RELEASE_NOTES.md
          fi

  deploy-website:
    name: Deploy Cloudflare Pages
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [website]
    env:
      CLOUDFLARE_CREDENTIALS_PRESENT: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Skip when Cloudflare token is missing
        if: env.CLOUDFLARE_CREDENTIALS_PRESENT != 'true'
        run: echo "Set CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID repository secrets to enable Cloudflare Pages deployment."

      - uses: actions/setup-node@v4
        if: env.CLOUDFLARE_CREDENTIALS_PRESENT == 'true'
        with:
          node-version: 22

      - name: Deploy to Cloudflare Pages
        if: env.CLOUDFLARE_CREDENTIALS_PRESENT == 'true'
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx wrangler@latest pages deploy website --project-name=north3rnlight3r --branch=main || {
            echo "::warning::Cloudflare Pages deployment skipped because repository Cloudflare credentials were rejected. Local Wrangler deploy remains valid; rotate CLOUDFLARE_API_TOKEN to restore CI deploys."
            exit 0
          }
