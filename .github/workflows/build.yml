name: Build AIFRED

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  vst3:
    name: VST3 ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows
            os: windows-latest
            package_platform: windows

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libjack-jackd2-dev ladspa-sdk libcurl4-openssl-dev libfreetype6-dev libx11-dev libxcomposite-dev libxcursor-dev libxext-dev libxinerama-dev libxrandr-dev libxrender-dev libwebkit2gtk-4.1-dev

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: "10.0.x"

      - name: Configure
        run: cmake -S . -B build/aifred -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build/aifred --config Release --parallel

      - name: Package VST3
        shell: pwsh
        run: ./tools/package-aifred.ps1 -BuildRoot build/aifred -OutputDir dist -Platform ${{ matrix.package_platform }}

      - name: Build Windows one-click installer
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          dotnet publish tools/AifredWindowsInstaller/AifredWindowsInstaller.csproj -c Release -o dist/installer/windows
          dotnet publish tools/AifredWindowsUninstaller/AifredWindowsUninstaller.csproj -c Release -o dist/uninstaller/windows
          Copy-Item dist/installer/windows/AIFRED-VST3-Setup.exe AIFRED-VST3-Setup.exe
          Copy-Item dist/uninstaller/windows/AIFRED-Uninstall.exe AIFRED-Uninstall.exe

      - name: Stage release artifacts
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets | Out-Null
          Copy-Item dist/AIFRED-VST3-${{ matrix.package_platform }}.zip release-assets/
          if (Test-Path AIFRED-VST3-Setup.exe) { Copy-Item AIFRED-VST3-Setup.exe release-assets/ }
          if (Test-Path AIFRED-Uninstall.exe) { Copy-Item AIFRED-Uninstall.exe release-assets/ }

      - name: Upload VST3 package
        uses: actions/upload-artifact@v4
        with:
          name: AIFRED-VST3-${{ matrix.name }}
          path: release-assets/*
          if-no-files-found: error

  website:
    name: Website checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: JavaScript syntax
        run: |
          node --check website/app.js
          node --check website/_worker.js
          node --check 'website/functions/api/v1/[[path]].js'
          node --check 'website/functions/api/[[path]].js'
          node --check website/functions/ws/chat.js
          node --check tools/serve-website.mjs

      - name: Guard active paths and product names
        shell: pwsh
        run: ./tools/check-no-hardcoded-paths.ps1

      - name: Analysis snapshot regression checks
        shell: pwsh
        run: ./tools/check-aifred-analysis-regressions.ps1

  release:
    name: Publish GitHub release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [vst3, website]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create or update release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if gh release view "${GITHUB_REF_NAME}" >/dev/null 2>&1; then
            gh release upload "${GITHUB_REF_NAME}" release-assets/* --clobber
          else
            gh release create "${GITHUB_REF_NAME}" release-assets/* \
              --title "AIFRED ${GITHUB_REF_NAME}" \
              --notes-file docs/RELEASE_NOTES.md
          fi

  deploy-website:
    name: Deploy Cloudflare Pages
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [website]
    env:
      CLOUDFLARE_CREDENTIALS_PRESENT: ${{ secrets.CLOUDFLARE_API_TOKEN != '' && secrets.CLOUDFLARE_ACCOUNT_ID != '' }}
    steps:
      - uses: actions/checkout@v4

      - name: Skip when Cloudflare token is missing
        if: env.CLOUDFLARE_CREDENTIALS_PRESENT != 'true'
        run: echo "Set CLOUDFLARE_API_TOKEN and CLOUDFLARE_ACCOUNT_ID repository secrets to enable Cloudflare Pages deployment."

      - uses: actions/setup-node@v4
        if: env.CLOUDFLARE_CREDENTIALS_PRESENT == 'true'
        with:
          node-version: 22

      - name: Deploy to Cloudflare Pages
        if: env.CLOUDFLARE_CREDENTIALS_PRESENT == 'true'
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          npx wrangler@latest pages deploy website --project-name=north3rnlight3r --branch=main || {
            echo "::warning::Cloudflare Pages deployment skipped because repository Cloudflare credentials were rejected. Local Wrangler deploy remains valid; rotate CLOUDFLARE_API_TOKEN to restore CI deploys."
            exit 0
          }
